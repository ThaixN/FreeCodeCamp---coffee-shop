<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Camper Cafe menu — specialty coffee and desserts since 2020." />
    <title>Cafe Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="menu">
      <main>
        <header>
          <h1>CAMPER CAFE</h1>
          <p class="established">Est. 2020</p>
        </header>
        
        <hr>
        
        <section>
          <div class="section-title-wrapper">
            <h2>Coffee</h2>
            <img class="section-icon" src="https://cdn.freecodecamp.org/curriculum/css-cafe/coffee.jpg" alt="coffee icon" />
          </div>
          
          <article class="item">
            <p class="flavor">French Vanilla</p>
            <p class="price">$3.00</p>
          </article>
          <article class="item">
            <p class="flavor">Caramel Macchiato</p>
            <p class="price">$3.75</p>
          </article>
          <article class="item">
            <p class="flavor">Pumpkin Spice</p>
            <p class="price">$3.50</p>
          </article>
          <article class="item">
            <p class="flavor">Hazelnut</p>
            <p class="price">$4.00</p>
          </article>
          <article class="item">
            <p class="flavor">Mocha</p>
            <p class="price">$4.50</p>
          </article>
        </section>
        
        <section>
          <div class="section-title-wrapper">
            <h2>Desserts</h2>
            <img class="section-icon" src="https://cdn.freecodecamp.org/curriculum/css-cafe/pie.jpg" alt="pie icon" />
          </div>
          
          <article class="item">
            <p class="dessert">Donut</p>
            <p class="price">$1.50</p>
          </article>
          <article class="item">
            <p class="dessert">Cherry Pie</p>
            <p class="price">$2.75</p>
          </article>
          <article class="item">
            <p class="dessert">Cheesecake</p>
            <p class="price">$3.00</p>
          </article>
          <article class="item">
            <p class="dessert">Cinnamon Roll</p>
            <p class="price">$2.50</p>
          </article>
        </section>
      </main>
      
      <hr class="bottom-line">
      
      <footer>
        <address>
          <p>
            <a href="https://www.freecodecamp.org" target="_blank" class="cafe-link">Visit our website</a>
          </p>
          <p class="address">123 Free Code Camp Drive</p>
        </address>
      </footer>
    </div>
  </body>
</html>
